<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dz" x1="8" y1="15" x2="112" y2="105" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5C7"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#FF2D9B"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes emb-pulse { 0%,100% { opacity:.85 } 50% { opacity:1 } }
      @keyframes emb-heart { 0%,100% { transform: scale(1) } 35% { transform: scale(1.18) } }
      .emb { animation: emb-pulse 2.6s ease-in-out infinite; }
      .heart { transform-origin: 60px 34px; animation: emb-heart 1.8s ease-in-out infinite; }
    </style>
  </defs>

  <g class="emb" filter="url(#glow)">
    <!-- hexagon badge -->
    <polygon points="112,60 86,105 34,105 8,60 34,15 86,15"
      fill="#0B0E1A" stroke="url(#dz)" stroke-width="3" stroke-linejoin="round"/>

    <!-- duo play triangles -->
    <path d="M40 50 L62 64 L40 78 Z" fill="#00E5C7"/>
    <path d="M56 50 L78 64 L56 78 Z" fill="#FF2D9B" fill-opacity="0.9"/>

    <!-- heart -->
    <path class="heart" d="M60 40c-2.4-3.2-7.6-2.2-7.6 1.8 0 2.6 3 4.8 7.6 7.6 4.6-2.8 7.6-5 7.6-7.6 0-4-5.2-5-7.6-1.8Z"
      fill="url(#dz)"/>
  </g>
</svg>
